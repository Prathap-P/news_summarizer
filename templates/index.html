<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Analyzer with TTS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        .container {
            flex: 1;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .mode-selector {
            background: white;
            padding: 20px 30px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .mode-selector h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }
        
        .mode-options {
            display: flex;
            gap: 15px;
        }
        
        .mode-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .mode-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .mode-option.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
        }
        
        .mode-option input[type="radio"] {
            display: none;
        }
        
        .mode-option label {
            cursor: pointer;
            font-weight: 600;
            color: #333;
            display: block;
        }
        
        .mode-option p {
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }
        
        .content {
            padding: 30px;
        }
        
        .url-section {
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .chat-container {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .message-user .message-content {
            background: #667eea;
            color: white;
        }
        
        .message-assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }
        
        .message-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .chat-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .chat-input-container input {
            flex: 1;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            cursor: pointer;
            user-select: none;
        }
        
        .status {
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .status-info {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status-error {
            background: #ffebee;
            color: #c62828;
        }
        
        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        .multi-queue-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .queue-panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 15px;
            min-width: 280px;
            max-width: 350px;
        }

        .queue-panel h3 {
            color: #667eea;
            font-size: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-align: center;
            justify-content: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .queue-section {
            margin-bottom: 15px;
        }

        .queue-section textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        .queue-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .queue-section textarea:read-only {
            background-color: #f9f9f9;
            cursor: not-allowed;
        }

        .queue-section .label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-processing {
            background-color: #ff9800;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .email-panel {
            width: 320px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            height: fit-content;
            position: sticky;
            z-index: 1;
            top: 20px;
        }
        
        .email-panel h3 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .email-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .email-form textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }
        
        .email-form textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: block;
            padding: 10px;
            background: #f0f0f0;
            border: 2px dashed #d0d0d0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.3s;
        }
        
        .file-input-label:hover {
            background: #e8f4f8;
            border-color: #667eea;
            color: #667eea;
        }
        
        .file-list {
            font-size: 12px;
            color: #666;
            max-height: 80px;
            overflow-y: auto;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            background: #f9f9f9;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        
        .file-item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .file-remove {
            color: #f44336;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }
        
        .file-remove:hover {
            color: #d32f2f;
        }
    </style>
</head>
<body>
    <!-- Queue Panel (Left Side) -->
    <div class="multi-queue-container">
        <!-- Tech Queue Panel -->
        <div class="queue-panel">
            <h3>🔧 Tech</h3>
            
            <div class="queue-section">
                <div class="label">📋 Queue</div>
                <textarea 
                    id="techQueueList" 
                    placeholder="Tech URLs (one per line)"
                ></textarea>
            </div>
            
            <div class="queue-section">
                <div class="label">⚙️ Processing</div>
                <textarea 
                    id="techProcessingList" 
                    readonly
                    placeholder="Processing..."
                ></textarea>
            </div>
            
            <div class="queue-section">
                <div class="label">❌ Failed</div>
                <textarea 
                    id="techFailedList" 
                    readonly
                    placeholder="Failed URLs"
                ></textarea>
            </div>
            
            <div class="queue-section">
                <div class="label">✅ Finished</div>
                <textarea 
                    id="techFinishedList" 
                    readonly
                    placeholder="Completed URLs"
                ></textarea>
            </div>
        </div>
        
        <!-- Social Queue Panel -->
        <div class="queue-panel">
            <h3>👥 Social</h3>
            
            <div class="queue-section">
                <div class="label">📋 Queue</div>
                <textarea 
                    id="socialQueueList" 
                    placeholder="Social URLs (one per line)"
                ></textarea>
            </div>
            
            <div class="queue-section">
                <div class="label">⚙️ Processing</div>
                <textarea 
                    id="socialProcessingList" 
                    readonly
                    placeholder="Processing..."
                ></textarea>
            </div>
            
            <div class="queue-section">
                <div class="label">❌ Failed</div>
                <textarea 
                    id="socialFailedList" 
                    readonly
                    placeholder="Failed URLs"
                ></textarea>
            </div>
            
            <div class="queue-section">
                <div class="label">✅ Finished</div>
                <textarea 
                    id="socialFinishedList" 
                    readonly
                    placeholder="Completed URLs"
                ></textarea>
            </div>
        </div>
        
        <!-- Science Queue Panel -->
        <div class="queue-panel">
            <h3>🔬 Science</h3>
            
            <div class="queue-section">
                <div class="label">📋 Queue</div>
                <textarea 
                    id="scienceQueueList" 
                    placeholder="Science URLs (one per line)"
                ></textarea>
            </div>
            
            <div class="queue-section">
                <div class="label">⚙️ Processing</div>
                <textarea 
                    id="scienceProcessingList" 
                    readonly
                    placeholder="Processing..."
                ></textarea>
            </div>
            
            <div class="queue-section">
                <div class="label">❌ Failed</div>
                <textarea 
                    id="scienceFailedList" 
                    readonly
                    placeholder="Failed URLs"
                ></textarea>
            </div>
            
            <div class="queue-section">
                <div class="label">✅ Finished</div>
                <textarea 
                    id="scienceFinishedList" 
                    readonly
                    placeholder="Completed URLs"
                ></textarea>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- <div class="header">
            <h1>📰 Content Analyzer with TTS</h1>
            <p>Analyze news articles or YouTube videos with AI</p>
        </div> -->
        
        <!-- Mode Selector -->
        <div class="mode-selector">
            <h3>Select Mode:</h3>
            <div class="mode-options">
                <div class="mode-option" onclick="selectMode('news')">
                    <input type="radio" id="modeNews" name="mode" value="news">
                    <label for="modeNews">📰 News Article</label>
                    <p>Analyze and discuss news articles</p>
                </div>
                <div class="mode-option active" onclick="selectMode('youtube')">
                    <input type="radio" id="modeYoutube" name="mode" value="youtube" checked>
                    <label for="modeYoutube">🎥 YouTube Transcript</label>
                    <p>Condense video transcripts</p>
                </div>
            </div>
        </div>
        
        <div class="content">
            <!-- URL Input Section -->
            <div class="url-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="urlInput" 
                        placeholder="Enter news article URL (e.g., https://example.com/article)"
                    >
                    <button class="btn btn-primary" id="loadBtn" onclick="loadContent()">
                        Load Content
                    </button>
                </div>
            </div>
            
            <!-- Status Messages -->
            <div id="statusMessage"></div>
            
            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer"></div>
            
            <!-- Chat Input Section -->
            <div class="chat-input-container">
                <input 
                    type="text" 
                    id="chatInput" 
                    placeholder="Ask a question about the content..."
                    disabled
                    onkeypress="handleKeyPress(event)"
                >
                <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()" disabled>
                    Send
                </button>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="audioCheckbox" checked>
                <label for="audioCheckbox">Generate audio (TTS)</label>
            </div>
            
            <div class="button-group">
                <button class="btn btn-secondary" onclick="clearConversation()">
                    Clear Conversation
                </button>
            </div>
        </div>
    </div>
    
    <!-- Email Sender Panel -->
    <div class="email-panel">
        <h3>📧 Quick Email</h3>
        <div class="email-form">
            <textarea 
                id="emailText" 
                placeholder="Type your message here..."
            ></textarea>
            
            <div class="file-input-wrapper">
                <input 
                    type="file" 
                    id="emailAttachment" 
                    multiple
                    accept=".wav,.mp3,.pdf,.txt,.doc,.docx"
                    onchange="handleFileSelect(event)"
                >
                <label for="emailAttachment" class="file-input-label">
                    📎 Attach Files
                </label>
            </div>
            
            <div id="fileList" class="file-list"></div>
            
            <div style="display: flex; gap: 8px;">
                <button 
                    class="btn btn-primary" 
                    onclick="sendQuickEmail()" 
                    id="quickEmailBtn"
                    style="flex: 1; background: #4caf50;"
                >
                    📧 Email
                </button>
                <button 
                    class="btn btn-primary" 
                    onclick="sendQuickTelegram()" 
                    id="quickTelegramBtn"
                    style="flex: 1; background: #0088cc;"
                >
                    ✈️ Telegram
                </button>
            </div>
        </div>
    </div>
    
    <!-- Text to Audio Tool -->
    <div class="email-panel">
        <h3>🎙️ Text to Audio</h3>
        <div class="email-form">
            <textarea 
                id="audioText" 
                placeholder="Paste or type text to convert to audio..."
                style="min-height: 150px;"
            ></textarea>
            
            <div id="audioStatus" style="margin: 10px 0; padding: 10px; border-radius: 6px; display: none;"></div>
            
            <div id="audioPlayer" style="margin: 10px 0; display: none;">
                <audio controls style="width: 100%; border-radius: 6px;">
                    <source id="audioSource" type="audio/wav">
                </audio>
            </div>
            
            <button 
                class="btn btn-primary" 
                onclick="generateAudio()" 
                id="generateAudioBtn"
                style="width: 100%; background: #9c27b0;"
            >
                🎙️ Generate Audio
            </button>
        </div>
    </div>
    
    <!-- Retry Failed Telegrams Button -->
    <div class="retry-section" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
        <button 
            id="retryFailedBtn" 
            class="btn btn-warning" 
            onclick="retryFailedTelegrams()"
            style="
                padding: 15px 25px;
                font-size: 16px;
                font-weight: 600;
                background: #ff9800;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
                transition: all 0.3s ease;
            "
            onmouseover="this.style.background='#fb8c00'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 16px rgba(255, 152, 0, 0.4)'"
            onmouseout="this.style.background='#ff9800'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(255, 152, 0, 0.3)'"
        >
            🔄 Retry Failed Telegrams
        </button>
    </div>
    
    <script>
        let selectedFiles = [];
        let isLoading = false;
        let currentMode = 'youtube';
        let currentUrl = '';
        
        // Auto-processor state
        let isProcessing = false;
        let autoProcessorEnabled = true;
        let wakeLock = null; // Wake Lock to prevent screen sleep during processing
        
        // Initialize auto-processor on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadQueuesFromStorage();
            startAutoProcessor();
            
            // Save queues when user edits them
            document.getElementById('techQueueList').addEventListener('input', saveQueuesToStorage);
            document.getElementById('socialQueueList').addEventListener('input', saveQueuesToStorage);
            document.getElementById('scienceQueueList').addEventListener('input', saveQueuesToStorage);
            
            // Handle page visibility changes to resume processing if tab becomes visible
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && autoProcessorEnabled && !isProcessing) {
                    console.log('[AUTO-PROCESSOR] Tab became visible, checking queue...');
                    // Reacquire wake lock if there are active queue items
                    if (hasActiveQueueItems() && wakeLock === null) {
                        acquireWakeLock();
                    }
                    processNextLink();
                }
            });
        });
        
        // Load queues from localStorage
        function loadQueuesFromStorage() {
            // Tech queue
            const techQueue = localStorage.getItem('techQueue') || '';
            const techProcessing = localStorage.getItem('techProcessing') || '';
            const techFailed = localStorage.getItem('techFailed') || '';
            const techFinished = localStorage.getItem('techFinished') || '';
            
            // Social queue
            const socialQueue = localStorage.getItem('socialQueue') || '';
            const socialProcessing = localStorage.getItem('socialProcessing') || '';
            const socialFailed = localStorage.getItem('socialFailed') || '';
            const socialFinished = localStorage.getItem('socialFinished') || '';
            
            // Science queue
            const scienceQueue = localStorage.getItem('scienceQueue') || '';
            const scienceProcessing = localStorage.getItem('scienceProcessing') || '';
            const scienceFailed = localStorage.getItem('scienceFailed') || '';
            const scienceFinished = localStorage.getItem('scienceFinished') || '';
            
            // Set values
            document.getElementById('techQueueList').value = techQueue;
            document.getElementById('techProcessingList').value = techProcessing;
            document.getElementById('techFailedList').value = techFailed;
            document.getElementById('techFinishedList').value = techFinished;
            
            document.getElementById('socialQueueList').value = socialQueue;
            document.getElementById('socialProcessingList').value = socialProcessing;
            document.getElementById('socialFailedList').value = socialFailed;
            document.getElementById('socialFinishedList').value = socialFinished;
            
            document.getElementById('scienceQueueList').value = scienceQueue;
            document.getElementById('scienceProcessingList').value = scienceProcessing;
            document.getElementById('scienceFailedList').value = scienceFailed;
            document.getElementById('scienceFinishedList').value = scienceFinished;
        }
        
        // Save queues to localStorage
        function saveQueuesToStorage() {
            // Tech queue
            localStorage.setItem('techQueue', document.getElementById('techQueueList').value);
            localStorage.setItem('techProcessing', document.getElementById('techProcessingList').value);
            localStorage.setItem('techFailed', document.getElementById('techFailedList').value);
            localStorage.setItem('techFinished', document.getElementById('techFinishedList').value);
            
            // Social queue
            localStorage.setItem('socialQueue', document.getElementById('socialQueueList').value);
            localStorage.setItem('socialProcessing', document.getElementById('socialProcessingList').value);
            localStorage.setItem('socialFailed', document.getElementById('socialFailedList').value);
            localStorage.setItem('socialFinished', document.getElementById('socialFinishedList').value);
            
            // Science queue
            localStorage.setItem('scienceQueue', document.getElementById('scienceQueueList').value);
            localStorage.setItem('scienceProcessing', document.getElementById('scienceProcessingList').value);
            localStorage.setItem('scienceFailed', document.getElementById('scienceFailedList').value);
            localStorage.setItem('scienceFinished', document.getElementById('scienceFinishedList').value);
        }
        
        // Check if any queue or processing list has active items
        function hasActiveQueueItems() {
            const categories = ['tech', 'social', 'science'];
            for (const category of categories) {
                const queueEl = document.getElementById(`${category}QueueList`);
                const processingEl = document.getElementById(`${category}ProcessingList`);
                
                if (queueEl && queueEl.value.trim().length > 0) {
                    return true;
                }
                if (processingEl && processingEl.value.trim().length > 0) {
                    return true;
                }
            }
            return false;
        }
        
        // Acquire wake lock to prevent screen sleep
        async function acquireWakeLock() {
            try {
                // Check if Wake Lock API is supported
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('[WAKE-LOCK] ✅ Screen wake lock acquired');
                    
                    // Listen for wake lock release
                    wakeLock.addEventListener('release', () => {
                        console.log('[WAKE-LOCK] Screen wake lock released');
                    });
                } else {
                    console.log('[WAKE-LOCK] ⚠️ Wake Lock API not supported in this browser');
                }
            } catch (err) {
                console.error('[WAKE-LOCK] ❌ Failed to acquire wake lock:', err);
            }
        }
        
        // Release wake lock
        async function releaseWakeLock() {
            try {
                if (wakeLock !== null) {
                    await wakeLock.release();
                    wakeLock = null;
                    console.log('[WAKE-LOCK] Screen wake lock manually released');
                }
            } catch (err) {
                console.error('[WAKE-LOCK] ❌ Failed to release wake lock:', err);
            }
        }
        
        // Start the auto-processor
        function startAutoProcessor() {
            console.log('[AUTO-PROCESSOR] Starting...');
            autoProcessorEnabled = true;
            processNextLink(); // Start processing immediately
        }
        
        // Get next URL from all queues (FIFO across all categories)
        function getNextUrlFromAllQueues() {
            const categories = ['tech', 'social', 'science'];
            
            for (const category of categories) {
                const queueEl = document.getElementById(`${category}QueueList`);
                const urls = queueEl.value.split('\n').filter(line => line.trim());
                
                if (urls.length > 0) {
                    const url = urls[0].trim();
                    // Remove from queue
                    urls.shift();
                    queueEl.value = urls.join('\n');
                    return { url, category };
                }
            }
            
            return null; // No URLs in any queue
        }
        
        // Process the next link in the queue
        async function processNextLink() {
            if (!autoProcessorEnabled) {
                console.log('[AUTO-PROCESSOR] Disabled, stopping...');
                return;
            }
            
            if (isProcessing) {
                console.log('[AUTO-PROCESSOR] Already processing, will retry...');
                // Retry after 2 seconds
                setTimeout(processNextLink, 2000);
                return;
            }
            
            // Check if any processing list has content
            const categories = ['tech', 'social', 'science'];
            let hasProcessing = false;
            for (const category of categories) {
                const processingEl = document.getElementById(`${category}ProcessingList`);
                if (processingEl.value.trim()) {
                    hasProcessing = true;
                    break;
                }
            }
            
            if (hasProcessing) {
                console.log('[AUTO-PROCESSOR] Processing list not empty, waiting...');
                // Retry after 2 seconds
                setTimeout(processNextLink, 2000);
                return;
            }
            
            // Get next URL from any queue
            const next = getNextUrlFromAllQueues();
            
            // Manage wake lock based on queue status
            if (hasActiveQueueItems() && wakeLock === null) {
                acquireWakeLock();
            } else if (!hasActiveQueueItems() && wakeLock !== null) {
                releaseWakeLock();
            }
            
            if (!next) {
                // All queues empty
                console.log('[AUTO-PROCESSOR] All queues empty, waiting for new items...');
                // Check again in 5 seconds in case user adds more
                setTimeout(processNextLink, 5000);
                return;
            }
            
            const { url, category } = next;
            console.log(`[AUTO-PROCESSOR] Processing from ${category} queue: ${url}`);
            
            // Move URL to processing list for this category
            const processingEl = document.getElementById(`${category}ProcessingList`);
            processingEl.value = url;
            saveQueuesToStorage();
            
            isProcessing = true;
            
            // Detect mode from URL
            const mode = url.includes('youtube.com') || url.includes('youtu.be') ? 'youtube' : 'news';
            
            try {
                const response = await fetch('/load_content', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        url, 
                        mode, 
                        auto_send_telegram: true,
                        category: category 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Success - move to finished list
                    console.log(`[AUTO-PROCESSOR] ✅ Success: ${url}`);
                    moveToFinished(url, category);
                } else {
                    // Failed - move to failed list
                    const errorMsg = data.error || 'Unknown error';
                    console.log(`[AUTO-PROCESSOR] ❌ Failed: ${url} - ${errorMsg}`);
                    moveToFailed(url, errorMsg, category);
                }
            } catch (error) {
                // Network or other error - move to failed list
                console.log(`[AUTO-PROCESSOR] ❌ Error: ${url} - ${error.message}`);
                moveToFailed(url, error.message, category);
            } finally {
                // Clear processing list
                processingEl.value = '';
                isProcessing = false;
                saveQueuesToStorage();
                
                // Check if we should release wake lock (no more items in any queue)
                if (!hasActiveQueueItems() && wakeLock !== null) {
                    releaseWakeLock();
                }
                
                // Process next item immediately (small delay to prevent tight loop)
                console.log('[AUTO-PROCESSOR] Processing complete, checking for next item...');
                setTimeout(processNextLink, 500);
            }
        }
        
        // Move URL to finished list
        function moveToFinished(url, category) {
            const finishedListEl = document.getElementById(`${category}FinishedList`);
            const currentFinished = finishedListEl.value.trim();
            finishedListEl.value = currentFinished ? `${currentFinished}\n${url}` : url;
            saveQueuesToStorage();
        }
        
        // Move URL to failed list
        function moveToFailed(url, error, category) {
            const failedListEl = document.getElementById(`${category}FailedList`);
            const currentFailed = failedListEl.value.trim();
            const entry = `${url} - Error: ${error}`;
            failedListEl.value = currentFailed ? `${currentFailed}\n${entry}` : entry;
            saveQueuesToStorage();
        }

                        // Build summary message
                        const parts = [];
                        if (data.sent > 0) parts.push(`✅ Sent: ${data.sent}`);
                        if (data.skipped > 0) parts.push(`⏭️ Skipped: ${data.skipped}`);
                        if (data.failed > 0) parts.push(`❌ Failed: ${data.failed}`);
                        
                        const summary = parts.join(', ');
                        showStatus(`Retry complete - ${summary}`, data.failed > 0 ? 'error' : 'success');
                        
                        // Log details to console
                        if (data.skipped_files.length > 0) {
                            console.log('[RETRY] Skipped files:', data.skipped_files);
                        }
                        if (data.failed_files.length > 0) {
                            console.log('[RETRY] Failed files:', data.failed_files);
                        }
                    }
                } else {
                    showStatus(data.error || 'Failed to retry telegrams', 'error');
                }
            } catch (error) {
                console.error('[RETRY] Error:', error);
                showStatus('Error: ' + error.message, 'error');

                btn.textContent = originalText;
                btn.style.background = '#ff9800';

                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: 'analyze',
                        generate_audio: document.getElementById('audioCheckbox').checked
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedText = '';
                let chunkCount = 0;
                let streamBuffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

<!--                    const chunk = decoder.decode(value);-->
<!--                    const lines = chunk.split('\n');-->


                    streamBuffer += decoder.decode(value, { stream: true });
                    let lines = streamBuffer.split("\n\n");
                    streamBuffer = lines.pop();
                    console.log("lines")
                    console.log(lines)

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.slice(5));
                                console.log('[STREAM] Received data:', data);
                                
                                // Check for errors
                                if (data.error) {
                                    placeholderDiv.remove();
                                    if (buttonContainer) {
                                        buttonContainer.remove();
                                    }
                                    showStatus('Error: ' + data.error, 'error');
                                    break;
                                }
                                
                                // Handle streaming chunks (only has 'chunk' field)
                                if (data.chunk !== undefined) {
                                    console.log('[STREAM] Adding chunk, length:', data.chunk.length);
                                    chunkCount++;
                                    accumulatedText += data.chunk;
                                    contentDiv.textContent = accumulatedText;
                                    // Don't force scroll - let user explore previous messages
                                } 
                                // Handle streaming complete, show audio loader if needed
                                else if (data.streaming_done === true) {
                                    console.log('[STREAM] Streaming done, audio generation starting...');
                                    // Change placeholder to show audio loading
                                    contentDiv.textContent = accumulatedText;
                                    const audioLoader = document.createElement('div');
                                    audioLoader.style.cssText = 'margin-top: 10px; padding: 10px; background: #fff3e0; border-left: 3px solid #ff9800; font-size: 13px; color: #555; border-radius: 4px;';
                                    audioLoader.innerHTML = '🎵 <span class="loading"></span> Generating audio...';
                                    placeholderDiv.appendChild(audioLoader);
                                }
                                // Handle final metadata message (has 'done' field)
                                else if (data.done === true) {
                                    console.log(`[STREAM] Done. Chunks: ${chunkCount}, Length: ${accumulatedText.length}`);
                                    // Remove placeholder and add final message with metadata
                                    placeholderDiv.remove();
                                    
                                    if (buttonContainer) {
                                        buttonContainer.remove();
                                    }
                                    
                                    const timings = {
                                        llm_time: data.llm_time || 0,
                                        audio_time: data.audio_time || null
                                    };
                                    
                                    addMessage(accumulatedText, false, data.audio_file, data.token_usage, timings);
                                    
                                    // Enable chat input after analysis
                                    document.getElementById('chatInput').disabled = false;
                                    document.getElementById('sendBtn').disabled = false;
                                    showStatus('Analysis complete! You can now ask questions.', 'success');
                                }
                            } catch (e) {
                                console.error('Error parsing SSE data:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('[STREAM] Analyze error:', error);
                // Remove placeholder on error
                const placeholder = document.getElementById('streaming-message');
                if (placeholder) placeholder.remove();
                
                // Restore button on error
                if (analyzeBtn) {
                    analyzeBtn.disabled = false;
                    analyzeBtn.textContent = currentMode === 'news' ? '📰 Analyze Article' : '🎬 Summarize Transcript';
                }
                showStatus('Error analyzing content: ' + error.message, 'error');
            } finally {
                isLoading = false;
            }
        }

        async function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            const message = chatInput.value.trim();
            
            if (!message || isLoading) return;
            
            isLoading = true;
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>';
            
            addMessage(message, true);
            chatInput.value = '';
            
            const generateAudio = document.getElementById('audioCheckbox').checked;
            
            // Create placeholder message for streaming
            const chatContainer = document.getElementById('chatContainer');
            const placeholderDiv = document.createElement('div');
            placeholderDiv.className = 'message message-assistant';
            placeholderDiv.id = 'streaming-message';
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = 'Assistant';
            placeholderDiv.appendChild(label);
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = '';
            placeholderDiv.appendChild(contentDiv);
            
            chatContainer.appendChild(placeholderDiv);
            
            try {
                console.log('[STREAM] Starting message stream...');
                const response = await fetch('/streamChat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        message,
                        generate_audio: generateAudio
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedText = '';
                let chunkCount = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.slice(5));
                                console.log('[STREAM] Received data:', data);
                                
                                // Check for errors
                                if (data.error) {
                                    placeholderDiv.remove();
                                    showStatus('Error: ' + data.error, 'error');
                                    break;
                                }
                                
                                // Handle streaming chunks (only has 'chunk' field)
                                if (data.chunk !== undefined) {
                                    console.log('[STREAM] Adding chunk, length:', data.chunk.length);
                                    chunkCount++;
                                    accumulatedText += data.chunk;
                                    contentDiv.textContent = accumulatedText;
                                    // Don't force scroll - let user explore previous messages
                                } 
                                // Handle streaming complete, show audio loader if needed
                                else if (data.streaming_done === true) {
                                    console.log('[STREAM] Streaming done, audio generation starting...');
                                    // Change placeholder to show audio loading
                                    contentDiv.textContent = accumulatedText;
                                    const audioLoader = document.createElement('div');
                                    audioLoader.style.cssText = 'margin-top: 10px; padding: 10px; background: #fff3e0; border-left: 3px solid #ff9800; font-size: 13px; color: #555; border-radius: 4px;';
                                    audioLoader.innerHTML = '🎵 <span class="loading"></span> Generating audio...';
                                    placeholderDiv.appendChild(audioLoader);
                                }
                                // Handle final metadata message (has 'done' field)
                                else if (data.done === true) {
                                    console.log(`[STREAM] Message complete. Chunks: ${chunkCount}, Length: ${accumulatedText.length}`);
                                    // Remove placeholder and add final message with metadata
                                    placeholderDiv.remove();
                                    
                                    const timings = {
                                        llm_time: data.llm_time || 0,
                                        audio_time: data.audio_time || null
                                    };
                                    
                                    addMessage(accumulatedText, false, data.audio_file, data.token_usage, timings);
                                    
                                    if (data.audio_file) {
                                        showStatus('Response with audio ready!', 'success');
                                    }
                                }
                            } catch (e) {
                                console.error('Error parsing SSE data:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('[STREAM] Message error:', error);
                // Remove placeholder on error
                const placeholder = document.getElementById('streaming-message');
                if (placeholder) placeholder.remove();
                
                showStatus('Error: ' + error.message, 'error');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }
        
        async function clearConversation() {
            if (!confirm('Are you sure you want to clear the conversation?')) {
                return;
            }
            
            try {
                const response = await fetch('/clear_conversation', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('chatContainer').innerHTML = '';
                    document.getElementById('chatInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                    document.getElementById('urlInput').value = '';
                    showStatus('Conversation cleared', 'success');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !isLoading) {
                sendMessage();
            }
        }
    </script>
